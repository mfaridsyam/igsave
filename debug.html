<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debug Story</title>
  <style>
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; padding: 16px; margin: 0; }
    h2 { color: #c13584; font-size: 1rem; margin-bottom: 12px; }
    input { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 6px; padding: 10px 12px; color: #fff; font-family: monospace; font-size: 13px; box-sizing: border-box; margin-bottom: 8px; }
    button { width: 100%; padding: 12px; background: linear-gradient(90deg,#c13584,#8134af); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer; font-family: monospace; margin-bottom: 16px; }
    button:disabled { opacity: 0.4; }
    .section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .section-title { font-size: 11px; color: #888; margin-bottom: 6px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 6px; }
    .ok { background: #1b3a1b; color: #4caf50; }
    .err { background: #3a1b1b; color: #f44336; }
    .warn { background: #3a2e1b; color: #ff9800; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; max-height: 200px; overflow-y: auto; color: #ccc; margin: 0; }
    .copy-btn { width: auto; padding: 5px 12px; font-size: 11px; margin-top: 6px; margin-bottom: 0; background: #333; }
    #status { color: #ff9800; font-size: 13px; text-align: center; margin: 8px 0; min-height: 20px; }
  </style>
</head>
<body>
  <h2>🔍 Debug Story Instagram</h2>
  <input type="text" id="username" placeholder="Username target (contoh: sntirndkla._)"/>
  <input type="password" id="sessionid" placeholder="Paste Session ID kamu..."/>
  <div id="status"></div>
  <button id="testBtn" onclick="runTest()">🚀 Test Semua Endpoint</button>
  <div id="results"></div>

<script>
async function runTest() {
  const username = document.getElementById('username').value.trim().replace('@','');
  const sessionid = document.getElementById('sessionid').value.trim();
  const btn = document.getElementById('testBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  if (!username || !sessionid) {
    status.textContent = '⚠️ Isi username dan session ID dulu!';
    return;
  }

  btn.disabled = true;
  status.textContent = '⏳ Testing 5 endpoint... harap tunggu';
  results.innerHTML = '';

  try {
    const res = await fetch('/api/debug', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, sessionid })
    });
    const data = await res.json();
    status.textContent = '✅ Selesai! Lihat hasil di bawah:';
    renderResults(data);
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function renderResults(data) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  const labels = {
    ig120_stories_body: 'IG120 /stories (body)',
    ig120_stories_cookie: 'IG120 /stories (cookie header)',
    ig120_story_singular: 'IG120 /story (singular)',
    ig120_highlights: 'IG120 /highlights',
    scraper_stories: 'Scraper API /stories URL',
  };

  for (const [key, val] of Object.entries(data)) {
    const div = document.createElement('div');
    div.className = 'section';

    const hasData = checkHasData(val);
    const isOk = val.status >= 200 && val.status < 300 && !val.error;
    const badgeClass = val.error ? 'err' : (hasData ? 'ok' : 'warn');
    const badgeText = val.error ? 'ERROR' : (hasData ? '✓ ADA DATA' : '⚠ KOSONG');

    const pretty = JSON.stringify(val?.response ?? val, null, 2);
    // Truncate long responses
    const truncated = pretty.length > 1500 ? pretty.slice(0, 1500) + '\n...[truncated]' : pretty;

    div.innerHTML = `
      <div class="section-title">${labels[key] || key}</div>
      <span class="badge ${badgeClass}">${badgeText}</span>
      ${val.status ? `<span style="font-size:11px;color:#888;margin-left:6px">HTTP ${val.status}</span>` : ''}
      <pre>${escHtml(truncated)}</pre>
      <button class="copy-btn" onclick="copyText(this, \`${escAttr(pretty)}\`)">📋 Copy</button>
    `;
    container.appendChild(div);
  }
}

function checkHasData(val) {
  if (!val || val.error) return false;
  const r = val.response;
  if (!r) return false;
  if (Array.isArray(r) && r.length > 0) return true;
  if (r.result && Array.isArray(r.result) && r.result.length > 0) return true;
  if (r.result?.items?.length > 0) return true;
  if (r.items?.length > 0) return true;
  if (r.data?.items?.length > 0) return true;
  if (r.data?.length > 0) return true;
  return false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy', 2000);
  }).catch(() => {
    btn.textContent = '⚠️ Gagal';
  });
}
</script>
</body>
</html>
